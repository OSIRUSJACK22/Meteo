<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo Villes Africaines - Carte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style-map.css">
</head>
<body>
    <header class="map-header-main-container">
        <nav class="map-navigation-primary-menu">
            <div class="map-navigation-logo-container">
                <span class="map-navigation-logo-icon">🗺️</span>
                <h1 class="map-navigation-site-title">Météo Afrique</h1>
            </div>
            <ul class="map-navigation-menu-list">
                <li class="map-navigation-menu-item"><a href="index.html" class="map-navigation-menu-link">Accueil</a></li>
                <li class="map-navigation-menu-item"><a href="dashboard.html" class="map-navigation-menu-link">Dashboard</a></li>
                <li class="map-navigation-menu-item"><a href="map.html" class="map-navigation-menu-link map-navigation-menu-link-active">Carte</a></li>
                <li class="map-navigation-menu-item"><a href="forecast.html" class="map-navigation-menu-link">Prévisions</a></li>
                <li class="map-navigation-menu-item"><a href="compare.html" class="map-navigation-menu-link">Comparaison</a></li>
                <li class="map-navigation-menu-item"><a href="about.html" class="map-navigation-menu-link">À propos</a></li>
            </ul>
        </nav>
    </header>

    <main class="map-main-content-wrapper">
        <section class="map-controls-section">
            <div class="map-search-container">
                <input type="text" class="map-search-input" placeholder="Rechercher une ville...">
                <button class="map-search-button">🔍</button>
            </div>
            <div class="map-filter-container">
                <button class="map-filter-button map-filter-button-active">Toutes</button>
                <button class="map-filter-button">Afrique de l'Ouest</button>
                <button class="map-filter-button">Afrique du Nord</button>
                <button class="map-filter-button">Afrique Centrale</button>
                <button class="map-filter-button">Afrique de l'Est</button>
                <button class="map-filter-button">Afrique Australe</button>
            </div>
        </section>

        <section class="map-interactive-container">
            <div class="map-africa-main-container">
                <!-- Vraie carte Leaflet -->
                <div id="map-africa-main-container" class="map-leaflet-container"></div>
                
                <!-- Popup d'informations personnalisé -->
                <div class="map-popup-info-container" id="map-popup-info" style="display: none;">
                    <div class="map-popup-header-section">
                        <h3 class="map-popup-city-name">Dakar</h3>
                        <button class="map-popup-close-button">×</button>
                    </div>
                    <div class="map-popup-content-wrapper">
                        <div class="map-popup-temperature-display">
                            <span class="map-popup-temperature-value">28°C</span>
                            <span class="map-popup-weather-icon">☀️</span>
                        </div>
                        <div class="map-popup-details-grid">
                            <div class="map-popup-detail-item">
                                <span class="map-popup-detail-label">Humidité</span>
                                <span class="map-popup-detail-value">65%</span>
                            </div>
                            <div class="map-popup-detail-item">
                                <span class="map-popup-detail-label">Vent</span>
                                <span class="map-popup-detail-value">15 km/h</span>
                            </div>
                        </div>
                        <a href="dashboard.html" class="map-popup-view-details-link">Voir le dashboard</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="map-footer-main-container">
        <div class="map-footer-content-wrapper">
            <p class="map-footer-copyright-text">&copy; 2026 Météo Villes Africaines. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/api-config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/main.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
